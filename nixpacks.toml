# Configurazione build per Railway (Nixpacks).
# Fissa Node 22 e pnpm, con più heap per la build Babylon/Vite.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-9_x"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[phases.build.variables]
NODE_OPTIONS = "--max-old-space-size=4096"

[start]
cmd = "pnpm start"
