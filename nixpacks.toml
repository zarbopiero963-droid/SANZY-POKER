# Configurazione build per Railway (Nixpacks).
# Fissa Node 22 e installa lo stesso pnpm della CI (10.4.1) via npm.
# Nota: NON usiamo corepack perché su Node 22 le sue chiavi di firma
# integrate falliscono la verifica del pacchetto pnpm scaricato dal
# registry ("Cannot find matching keyid"); npm -g installa la versione
# esatta senza quel passaggio di firma, come fa pnpm/action-setup in CI.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.4.1",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = ["pnpm build"]

[phases.build.variables]
NODE_OPTIONS = "--max-old-space-size=4096"

[start]
cmd = "pnpm start"
