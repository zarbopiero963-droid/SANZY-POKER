name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Typecheck e test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Installa dipendenze
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm check
      - name: Test del regolamento (Standard e Hi/Low, 2-4 giocatori)
        run: pnpm test

  format:
    name: Controllo formato (informativo, non bloccante)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Installa dipendenze
        run: pnpm install --frozen-lockfile
      - name: Prettier
        run: pnpm exec prettier --check .

  build:
    name: Build di produzione
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Installa dipendenze
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Pubblica artefatto
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
