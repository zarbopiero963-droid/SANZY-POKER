# Code review AI con Anthropic Fable 5.
# Si attiva SOLO se la PR ha la label `ai-review:fable`, e gira a ogni nuovo
# commit finché la label è presente (commenta ogni commit). La review è un
# COMMENTO, non un check bloccante: il merge resta manuale del proprietario.
name: AI Review — Fable 5

on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

# Annulla il run precedente su nuovo commit: rivede solo l'ultimo → meno credito.
concurrency:
  group: ai-review-fable-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'ai-review:fable')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepara la diff della PR (solo file cambiati, esclusi rumori)
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff "origin/${{ github.base_ref }}...HEAD" -- . \
            ':(exclude)pnpm-lock.yaml' \
            ':(exclude)dist/**' \
            ':(exclude)**/*.lock' > /tmp/pr.diff || true
          echo "Diff bytes:"; wc -c /tmp/pr.diff
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Review (Anthropic Fable 5)
        env:
          PROVIDER: anthropic
          MODEL: ${{ vars.ANTHROPIC_REVIEW_MODEL || 'claude-fable-5' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEWER_NAME: "Anthropic Fable 5"
          DIFF_FILE: /tmp/pr.diff
        run: node .github/scripts/ai-review.mjs
